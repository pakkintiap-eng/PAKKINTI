<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pakkinti</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
    color: white;
}

/* HERO /
.hero {
    text-align: center;
    padding: 100px 20px;
}

.hero h1 {
    font-size: 50px;
    color: #ffd700;
}

.hero p {
    font-size: 20px;
    opacity: 0.8;
}

.btn {
    padding: 15px 30px;
    border-radius: 30px;
    border: none;
    margin: 10px;
    cursor: pointer;
    font-weight: bold;
}

.primary {
    background: gold;
    color: black;
}

.secondary {
    background: transparent;
    border: 1px solid gold;
    color: gold;
}

/ FEATURES /
.features {
    padding: 80px 20px;
    text-align: center;
}

.features h2 {
    font-size: 35px;
    margin-bottom: 40px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #1f1f2e;
    padding: 20px;
    border-radius: 15px;
}

/ FOOTER */
.footer {
    text-align: center;
    padding: 40px;
    opacity: 0.6;
}
</style>
</head>

<body>

<section class="hero">
    <h1>పక్కింటి</h1>
    <p>Rent anything from your neighbour in 15 minutes</p>
    <button class="btn primary">Join Early Access</button>
    <button class="btn secondary">Earn Money</button>
</section>

<section class="features">
    <h2>Why Pakkinti?</h2>
    <div class="grid">
        <div class="card">⚡ Instant Rentals</div>
        <div class="card">💰 Earn from Idle Items</div>
        <div class="card">🏠 Hyperlocal Community</div>
        <div class="card">🔒 Safe & Verified</div>
    </div>
</section>

<section class="footer">
    <p>© 2026 Pakkinti. All rights reserved.</p>
</section>

</body>
</
