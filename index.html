<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pakkinti</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0b0f1a,#1a2238);
  color: white;
  text-align: center;
}

.section {
  padding: 80px 20px;
}

.hero img {
  width: 120px;
}

h1 {
  font-size: 48px;
  color: #f5d27a;
}

p {
  color: #ccc;
}

button {
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  margin: 10px;
  font-weight: bold;
}

.primary {
  background: gold;
  color: black;
}

.secondary {
  background: transparent;
  border: 1px solid gold;
  color: gold;
}

.card {
  background: #111827;
  padding: 20px;
  margin: 10px;
  border-radius: 12px;
}

.flex {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="section hero">
  <img src="logo.jpg" />
  <h1>పక్కింటి</h1>
  <h2>Rent Anything from your Neighbour in 15 Minutes</h2>
  <p>Now live in Visakhapatnam</p>
  <button class="primary">Join Early Access</button>
  <button class="secondary">Earn Money</button>
</div>

<!-- FEATURES -->
<div class="section">
  <h2>Why Pakkinti?</h2>
  <div class="flex">
    <div class="card">⚡ 15 Min Delivery</div>
    <div class="card">💰 Earn from unused items</div>
    <div class="card">🤝 Trusted neighbours</div>
  </div>
</div>

<!-- HOW IT WORKS -->
<div class="section">
  <h2>How it Works</h2>
  <div class="flex">
    <div class="card">1. List Item</div>
    <div class="card">2. Neighbour books</div>
    <div class="card">3. Earn Money</div>
  </div>
</div>

<!-- STATS -->
<div class="section">
  <h2>Our Impact</h2>
  <div class="flex">
    <div class="card">4,659 Users</div>
    <div class="card">₹16Cr+ Savings</div>
    <div class="card">4.9 Rating</div>
  </div>
</div>

<!-- FOOTER -->
<div class="section">
  <p>© 2026 Pakkinti</p>
</div>

</body>
</html>
